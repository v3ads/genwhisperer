# CI for GenWhisperer. This pipeline tests and builds the app and verifies that
# the required deployment secrets are configured. It does NOT deploy — the
# hosting platform (Railway) deploys from `main` via its own GitHub integration.
name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Verify required deployment secrets are configured ───────────────────────
  # Honest presence gate: fails the run if any required secret is missing so a
  # broken deploy is caught in CI rather than at runtime. Secret values are only
  # tested for emptiness here — they are never printed or written to disk.
  verify-secrets:
    name: Verify required secrets
    needs: build
    runs-on: ubuntu-latest
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ENCRYPTION_SECRET: ${{ secrets.ENCRYPTION_SECRET }}
      OPENROUTER_PLATFORM_KEY: ${{ secrets.OPENROUTER_PLATFORM_KEY }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      APP_URL: ${{ secrets.APP_URL }}
      ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
    steps:
      - name: Check required secrets are present
        run: |
          missing=0
          for key in NEON_DATABASE_URL JWT_SECRET ENCRYPTION_SECRET \
                     OPENROUTER_PLATFORM_KEY BREVO_API_KEY ADMIN_EMAIL \
                     APP_URL ALLOWED_ORIGINS; do
            if [ -z "${!key}" ]; then
              echo "  ✗ ${key} MISSING"
              missing=1
            else
              echo "  ✓ ${key}"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::One or more required secrets are not configured."
            exit 1
          fi
          echo "✓ All required secrets are configured."
